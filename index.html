<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Restaurant Ordering System - ລະບົບສັ່ງອາຫານ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --primary-light: #fdebd0;
            --success: #27ae60;
            --success-light: #d5f5e3;
            --warning: #f39c12;
            --warning-light: #fef9e7;
            --danger: #e74c3c;
            --danger-light: #fadbd8;
            --info: #3498db;
            --info-light: #d6eaf8;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --white: #ffffff;
            --border-radius: 12px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        body { font-family: 'Noto Sans Lao', sans-serif; background: var(--gray-100); color: var(--gray-800); font-size: 14px; }

        /* ===== LOGIN ===== */
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding: 20px; }
        .login-box { background: var(--white); border-radius: 16px; box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; padding: 40px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo { width: 80px; height: 80px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .login-header .logo i { font-size: 36px; color: var(--primary); }
        .login-header h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
        .login-form .form-group { margin-bottom: 20px; }
        .login-form label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.875rem; }
        .login-form input, .login-form select { width: 100%; padding: 12px 14px; border: 2px solid var(--gray-200); border-radius: var(--border-radius); font-family: inherit; font-size: 0.9375rem; }
        .login-form input:focus, .login-form select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); color: var(--white); border: none; border-radius: var(--border-radius); font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-login:hover { background: var(--primary-dark); }

        /* ===== APP LAYOUT ===== */
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--white); border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 12px; height: 60px; }
        .logo-small { width: 36px; height: 36px; background: var(--primary-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-small i { color: var(--primary); font-size: 1.125rem; }
        .brand-name { font-weight: 700; font-size: 1.125rem; }
        .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
        .sidebar-nav ul { list-style: none; }
        .sidebar-nav li { margin-bottom: 4px; }
        .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--border-radius); color: var(--gray-600); text-decoration: none; font-size: 0.9375rem; font-weight: 500; cursor: pointer; }
        .sidebar-nav a:hover { background: var(--gray-100); color: var(--primary); }
        .sidebar-nav a.active { background: var(--primary-light); color: var(--primary); }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--gray-200); }
        .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .user-avatar { width: 36px; height: 36px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .user-name { font-weight: 600; font-size: 0.875rem; }
        .user-role { font-size: 0.75rem; color: var(--gray-500); }
        .btn-logout { width: 100%; padding: 10px; background: var(--danger-light); color: var(--danger); border: none; border-radius: var(--border-radius); font-family: inherit; font-size: 0.875rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-logout:hover { background: var(--danger); color: var(--white); }
        .main-content { flex: 1; margin-left: 260px; min-height: 100vh; }
        .top-bar { height: 60px; background: var(--white); border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
        .page-title h2 { font-size: 1.25rem; font-weight: 600; }
        .top-actions { display: flex; align-items: center; gap: 16px; }
        .current-time { font-size: 0.875rem; color: var(--gray-500); }
        .content-area { padding: 24px; }

        /* ===== DASHBOARD STATS ===== */
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); border-left: 4px solid var(--primary); }
        .stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .stat-label { font-size: 0.875rem; color: var(--gray-500); }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--primary-light); color: var(--primary); }
        .stat-value { font-size: 1.75rem; font-weight: 700; }

        /* ===== DATA TABLE ===== */
        .data-table-container { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); overflow-x: auto; }
        .table-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .table-title { font-size: 1rem; font-weight: 600; }
        .table-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .data-table { width: 100%; border-collapse: collapse; min-width: 500px; }
        .data-table th, .data-table td { padding: 12px 16px; text-align: left; font-size: 0.875rem; border-bottom: 1px solid var(--gray-200); }
        .data-table th { background: var(--gray-100); font-weight: 600; }
        .data-table tbody tr:hover { background: var(--gray-50); }

        /* ===== STATUS BADGES ===== */
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-pending  { background: var(--warning-light);  color: var(--warning); }
        .status-confirmed{ background: var(--info-light);     color: var(--info); }
        .status-cooking  { background: var(--primary-light);  color: var(--primary); }
        .status-completed{ background: var(--success-light);  color: var(--success); }
        .status-paid     { background: var(--success-light);  color: var(--success); }
        .status-cancelled{ background: var(--danger-light);   color: var(--danger); }
        /* FIX: added missing status-success class */
        .status-success  { background: var(--success-light);  color: var(--success); }
        .status-inactive { background: var(--danger-light);   color: var(--danger); }

        /* ===== BUTTONS ===== */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--border-radius); font-family: inherit; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary  { background: var(--primary);  color: var(--white); }
        .btn-primary:hover  { background: var(--primary-dark); }
        .btn-success  { background: var(--success);  color: var(--white); }
        .btn-success:hover  { background: #219a52; }
        .btn-danger   { background: var(--danger);   color: var(--white); }
        .btn-danger:hover   { background: #c0392b; }
        .btn-warning  { background: var(--warning);  color: var(--white); }
        .btn-warning:hover  { background: #d68910; }
        .btn-secondary{ background: var(--gray-300); color: var(--gray-700); }
        .btn-outline  { background: transparent; border: 1px solid var(--gray-400); color: var(--gray-700); }
        .btn-outline:hover  { background: var(--gray-100); }
        .btn-sm       { padding: 4px 12px; font-size: 0.75rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== MODAL ===== */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--white); border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .modal-content.modal-lg { max-width: 900px; }
        .modal-header { padding: 16px 24px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 1; }
        .modal-header h3 { font-size: 1.125rem; font-weight: 600; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-400); line-height: 1; }
        .close-btn:hover { color: var(--danger); }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--gray-200); display: flex; gap: 12px; justify-content: flex-end; }

        /* ===== FORMS ===== */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.875rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-family: inherit; font-size: 0.875rem; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .required { color: var(--danger); }

        /* ===== MENU GRID (Customer App) ===== */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 16px; }
        .menu-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s; }
        .menu-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .menu-image { height: 160px; background: var(--gray-200); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .menu-info { padding: 12px; }
        .menu-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
        .menu-price { color: var(--primary); font-weight: 600; }
        .menu-description { font-size: 0.75rem; color: var(--gray-500); margin-top: 4px; }

        /* ===== CART SIDEBAR ===== */
        .cart-sidebar { position: fixed; right: 0; top: 0; width: 380px; height: 100vh; background: var(--white); box-shadow: -2px 0 8px rgba(0,0,0,0.1); z-index: 200; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
        .cart-sidebar.open { transform: translateX(0); }
        .cart-header { padding: 16px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--gray-200); }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 500; }
        .cart-item-price { font-size: 0.75rem; color: var(--gray-500); }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--gray-300); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; }
        .qty-btn:hover { background: var(--gray-100); }
        .cart-footer { padding: 16px; border-top: 1px solid var(--gray-200); }
        .cart-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.125rem; margin-bottom: 16px; }

        /* ===== TABLE GRID ===== */
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; padding: 20px; }
        .table-card { background: var(--white); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s; border: 2px solid transparent; }
        .table-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .table-card.occupied { background: var(--danger-light); border-color: var(--danger); }
        .table-card.selected { background: var(--primary-light); border: 2px solid var(--primary); }
        .table-number { font-size: 1.5rem; font-weight: 700; }
        .table-status { font-size: 0.7rem; margin-top: 4px; color: var(--gray-500); }

        /* ===== KDS ===== */
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .kds-order-card { background: var(--white); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); border-left: 4px solid var(--warning); }
        .kds-order-header { display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--gray-200); }
        .kds-items { margin: 12px 0; }
        .kds-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px dotted var(--gray-200); }
        .timer { font-size: 0.75rem; color: var(--gray-500); }

        /* ===== CUSTOMER HEADER ===== */
        .customer-header { background: var(--primary); color: white; padding: 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .category-tabs { display: flex; overflow-x: auto; gap: 8px; padding: 12px; background: var(--white); border-bottom: 1px solid var(--gray-200); position: sticky; top: 60px; }
        .category-tab { padding: 8px 16px; border-radius: 20px; background: var(--gray-100); cursor: pointer; white-space: nowrap; font-size: 0.875rem; }
        .category-tab.active { background: var(--primary); color: white; }

        /* ===== TOAST ===== */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--white); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; box-shadow: var(--shadow-lg); border-left: 4px solid var(--primary); animation: slideIn 0.3s ease; min-width: 260px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ===== LOADING ===== */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--gray-300); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== EMPTY STATE ===== */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; color: var(--gray-300); display: block; }
        .empty-state h3 { margin-bottom: 8px; color: var(--gray-700); }

        /* ===== PAGINATION ===== */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; border-top: 1px solid var(--gray-200); flex-wrap: wrap; }

        /* ===== SEARCH INPUT ===== */
        .search-input { padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-family: inherit; font-size: 0.875rem; }
        .search-input:focus { outline: none; border-color: var(--primary); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .cart-sidebar { width: 100%; }
            .form-row { grid-template-columns: 1fr; }
            .dashboard-stats { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- ===== LOGIN PAGE ===== -->
    <div id="login-page" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo"><i class="fas fa-utensils"></i></div>
                <h1>ລະບົບສັ່ງອາຫານຮ້ານອາຫານ</h1>
                <p style="color:var(--gray-500); font-size:0.875rem;">Restaurant Ordering System</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> ອີເມວ</label>
                    <input type="email" id="email" placeholder="cashier@test.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> ລະຫັດຜ່ານ</label>
                    <input type="password" id="password" placeholder="123456" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> ຕຳແໜ່ງ</label>
                    <select id="role" required>
                        <option value="">ເລືອກຕຳແໜ່ງ</option>
                        <option value="cashier">ພະນັກງານເງິນ (Cashier)</option>
                        <option value="kitchen">ພໍ່ຄົວ (Kitchen)</option>
                        <option value="waiter">ພະນັກງານບໍລິການ (Waiter)</option>
                        <option value="admin">ຜູ້ບໍລິຫານ (Admin)</option>
                    </select>
                </div>
                <button id="login-btn" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> ເຂົ້າສູ່ລະບົບ
                </button>
                <div id="login-error" style="display:none; color:var(--danger); margin-top:12px; text-align:center; font-size:0.875rem;"></div>
            </div>
            <div style="text-align:center; margin-top:24px; font-size:0.75rem; color:var(--gray-400);">
                <p>Demo: cashier@test.com / 123456 / cashier</p>
            </div>
        </div>
    </div>

    <!-- ===== MAIN STAFF APP ===== -->
    <div id="main-app" class="app-container" style="display:none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-small"><i class="fas fa-utensils"></i></div>
                <span class="brand-name">ເມນູອາຫານ</span>
            </div>
            <nav class="sidebar-nav">
                <ul id="nav-menu"></ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                    <div>
                        <div id="user-name" class="user-name">User</div>
                        <div id="user-role" class="user-role">Role</div>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> ອອກຈາກລະບົບ
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title"><h2 id="page-title">ໜ້າຫຼັກ</h2></div>
                <div class="top-actions">
                    <div id="current-time" class="current-time"></div>
                </div>
            </header>
            <div id="content-area" class="content-area">
                <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i><p>ກຳລັງໂຫລດ...</p></div>
            </div>
        </main>
    </div>

    <!-- ===== CUSTOMER WEB APP ===== -->
    <div id="customer-app" style="display:none;">
        <div class="customer-header">
            <i class="fas fa-utensils fa-lg"></i>
            <div style="text-align:center; font-weight:600;" id="customer-table-info">ໂຕະ: -</div>
            <div class="cart-icon" onclick="openCart()">
                <i class="fas fa-shopping-cart fa-lg"></i>
                <span id="cart-count" class="cart-badge" style="display:none;">0</span>
            </div>
        </div>
        <div class="category-tabs" id="category-tabs"></div>
        <div id="customer-content" style="padding:12px; padding-bottom:80px;"></div>

        <div id="cart-sidebar" class="cart-sidebar">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> ກະຕ່າຂອງຂ້ອຍ</h3>
                <button class="close-btn" onclick="closeCart()">&times;</button>
            </div>
            <div class="cart-items" id="cart-items"></div>

    const container = document.getElementById('toast-container');

    toast.className = 'toast';
    const colors    = { success: 'var(--success)', error: 'var(--danger)', warning: 'var(--warning)' };

        if (password !== '123456') throw new Error('ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ');

        currentUser = staff[0];
        localStorage.setItem('restaurant_user', JSON.stringify(currentUser));

async function loadPage(page) {
    // stop scanner if leaving scan page
    if (currentPage === 'scan' && page !== 'scan') stopCashierScanner();

    currentPage = page;
    const titles = {
        dashboard: 'ໜ້າຫຼັກ',
        menu:      'ຈັດການເມນູອາຫານ',

        kds:       'ຈໍສະແດງຜົນເຮືອນຄົວ (KDS)',
        staff:     'ຈັດການພະນັກງານ',
        scan:      'ສະແກນ QR'
    };
    document.getElementById('page-title').textContent = titles[page] || page;

    // update active nav
    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
    const activeLink = document.getElementById(`nav-${page}`);
    if (activeLink) activeLink.classList.add('active');

    if      (page === 'dashboard') await loadDashboard();
    else if (page === 'menu')      await loadMenuManagement();
    else if (page === 'tables')    await loadTablesManagement();
    else if (page === 'orders')    { currentOrdersPage = 1; await loadAllOrders(1); }
    else if (page === 'reports')   { currentReportsPage = 1; await loadReports(1); }
    else if (page === 'kds')       await loadKDS();
    else if (page === 'staff')     await loadStaffManagement();
    else if (page === 'scan')      await loadScanPage();
}

// REALTIME SUBSCRIPTION
// ============================================
function subscribeToRealtime() {
    const supabase = initSupabase();
    supabase.channel('restaurant-updates')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
            if (currentPage === 'dashboard') loadDashboard();
            if (currentPage === 'orders')   loadAllOrders(currentOrdersPage);
            if (currentPage === 'kds')      loadKDS();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'order_items' }, () => {
            if (currentPage === 'kds') loadKDS();
        })
        // FIX: subscribe to table status changes so the Tables page updates automatically
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'restaurant_tables' }, () => {
            if (currentPage === 'tables')    loadTablesManagement();
            if (currentPage === 'dashboard') loadDashboard();
        })
        .subscribe();
}

async function saveMenuItem() {
    const supabase       = initSupabase();
    const code           = document.getElementById('item_code')?.value.trim();
    const name_lo        = document.getElementById('item_name_lo')?.value.trim();
    const category_id    = document.getElementById('item_category')?.value || null;
    const price          = parseFloat(document.getElementById('item_price')?.value) || 0;
    const description_lo = document.getElementById('item_description')?.value.trim();
    const is_recommended = document.getElementById('item_recommended')?.checked || false;

    if (!name_lo) { showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຊື່ອາຫານ', 'warning'); return; }

    showLoading();
    try {
        let image_url = null;
        const imgFile = document.getElementById('item_image')?.files[0];
        if (imgFile) image_url = await uploadMenuItemImage(imgFile);

        await supabase.from('menu_items').insert([{
            code: code || `ITEM${Date.now()}`,
            name_lo, category_id, price, description_lo,
            is_recommended, is_available: true, image_url
        }]);

        document.querySelector('.modal.show')?.remove();
        showToast('ສຳເລັດ', 'ເພີ່ມອາຫານສຳເລັດ');
        loadMenuManagement();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

    showLoading();
    try {
        const supabase = initSupabase();
        const { data: tables } = await supabase
            .from('restaurant_tables').select('*').order('table_number');

            <div class="data-table-container">

                    </div>
                </div>
                <div style="padding:8px 16px;background:var(--gray-50);display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--gray-200);">

                    <span><span style="display:inline-block;width:12px;height:12px;background:var(--danger);border-radius:50%;margin-right:4px;"></span>ມີລູກຄ້າ</span>
                </div>
                <div class="table-grid">
                    ${!tables || tables.length === 0
                        ? `<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-chair"></i><h3>ບໍ່ມີໂຕະ</h3></div>`
                        : tables.map(t => `
                            <div class="table-card ${t.status === 'occupied' ? 'occupied' : ''}" onclick="showTableQR('${t.id}', ${t.table_number})">
                                <div class="table-number">ໂຕະ ${t.table_number}</div>
                                <div class="table-status" style="color:${t.status === 'occupied' ? 'var(--danger)' : 'var(--success)'};">
                                    ${t.status === 'occupied' ? 'ມີລູກຄ້າ' : 'ຫວ່າງ'}
                                </div>
                                <div style="margin-top:8px;"><i class="fas fa-qrcode" style="color:var(--primary);"></i></div>
                            </div>`).join('')}
                </div>
            </div>`;
    } catch (err) {
        content.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${err.message}</p></div>`;
    }
    hideLoading();
}

async function showTableQR(tableId, tableNumber) {
    const qrData = `${window.location.origin}${window.location.pathname}?table=${tableId}`;
    const modal  = document.createElement('div');
    modal.className = 'modal show';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header">
                <h3><i class="fas fa-qrcode"></i> QR Code ໂຕະ ${tableNumber}</h3>
                <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
            </div>
            <div class="modal-body" style="text-align:center;">
                <div id="qrcode" style="margin:0 auto;display:inline-block;"></div>
                <p style="margin-top:16px;color:var(--gray-600);">ສະແກນ QR ນີ້ເພື່ອສັ່ງອາຫານ</p>
                <p style="font-size:0.75rem;color:var(--gray-400);word-break:break-all;">${qrData}</p>
                <button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="copyToClipboard('${qrData}')">
                    <i class="fas fa-copy"></i> ສຳເນົາ URL
                </button>
            </div>
        </div>`;
    document.body.appendChild(modal);

    const supabase = initSupabase();
    await supabase.from('restaurant_tables').update({ qr_code: qrData }).eq('id', tableId);
    setTimeout(() => {
        new QRCode(document.getElementById('qrcode'), { text: qrData, width: 220, height: 220 });
    }, 100);
}

async function generateAllQRCodes() {
    const supabase = initSupabase();
    showLoading();
    try {
        const { data: tables } = await supabase.from('restaurant_tables').select('*');
        for (const t of (tables || [])) {
            const qrData = `${window.location.origin}${window.location.pathname}?table=${t.id}`;
            await supabase.from('restaurant_tables').update({ qr_code: qrData }).eq('id', t.id);
        }
        showToast('ສຳເລັດ', 'ສ້າງ QR Code ທັງໝົດສຳເລັດ');
        loadTablesManagement();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

async function loadAllOrders(page = 1) {
    const content = document.getElementById('content-area');
    showLoading();
    try {
        const supabase = initSupabase();

        // Total count
        const { count: total } = await supabase
            .from('orders').select('*', { count: 'exact', head: true });
        totalOrders = total || 0;

        const start = (page - 1) * ordersPerPage;
        const end   = start + ordersPerPage - 1;

        const { data: orders, error } = await supabase
            .from('orders')
            .select('*, restaurant_tables(table_number)')
            .order('created_at', { ascending: false })
            .range(start, end);

        if (error) throw error;

        const totalPages = Math.max(1, Math.ceil(totalOrders / ordersPerPage));

        content.innerHTML = `
            <div class="data-table-container">
                <div class="table-header">
                    <h3 class="table-title"><i class="fas fa-clipboard-list"></i> ລາຍການຄຳສັ່ງທັງໝົດ</h3>
                    <div class="table-actions">
                        <input type="text" id="order-search" class="search-input" placeholder="ຄົ້ນຫາຄຳສັ່ງ..." style="width:200px;">
                        <select id="orders-per-page" onchange="changeOrdersPerPage()" style="padding:6px 12px;border:1px solid var(--gray-300);border-radius:8px;font-family:inherit;">
                            <option value="10"  ${ordersPerPage===10  ?'selected':''}>10 ລາຍການ</option>
                            <option value="20"  ${ordersPerPage===20  ?'selected':''}>20 ລາຍການ</option>
                            <option value="50"  ${ordersPerPage===50  ?'selected':''}>50 ລາຍການ</option>
                            <option value="100" ${ordersPerPage===100 ?'selected':''}>100 ລາຍການ</option>
                        </select>
                    </div>
                </div>
                <div style="overflow-x:auto;">
                    <table class="data-table" style="width:100%;">

function changeOrdersPage(newPage) {
    const totalPages = Math.ceil(totalOrders / ordersPerPage);
    if (newPage < 1 || newPage > totalPages) return;
    currentOrdersPage = newPage;
    loadAllOrders(currentOrdersPage);
}

function changeOrdersPerPage() {
    const el = document.getElementById('orders-per-page');
    if (el) { ordersPerPage = parseInt(el.value); currentOrdersPage = 1; loadAllOrders(1); }
}

// ===== ORDER ACTIONS =====
        async function confirmOrder(orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        // Check if order has any non-cancelled items
        const { data: activeItems, error: itemsCheck } = await supabase
            .from('order_items')
            .select('id')
            .eq('order_id', orderId)
            .neq('status', 'cancelled');
        
        if (itemsCheck) throw itemsCheck;
        
        if (!activeItems || activeItems.length === 0) {
            showToast('ແຈ້ງເຕືອນ', 'ບໍ່ສາມາດຢືນຢັນຄຳສັ່ງທີ່ບໍ່ມີລາຍການ', 'warning');
            hideLoading();
            return;
        }
        
        // Update order status
        await supabase
            .from('orders')
            .update({ 
                status: 'confirmed', 
                confirmed_at: new Date().toISOString() 
            })
            .eq('id', orderId);
        
        // Update only non-cancelled items to confirmed
        await supabase
            .from('order_items')
            .update({ status: 'confirmed' })
            .eq('order_id', orderId)
            .neq('status', 'cancelled');
        
        showToast('ສຳເລັດ', 'ຢືນຢັນຄຳສັ່ງ — ສົ່ງໄປຄົວແລ້ວ');
        
        // Refresh views
        await loadAllOrders(currentOrdersPage);
        if (currentPage === 'kds') loadKDS();
        
    } catch (err) { 
        showToast('ຜິດພາດ', err.message, 'error'); 
    }
    hideLoading();
}
async function markAsPaid(orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        await supabase.from('orders').update({ status: 'paid', paid_at: new Date().toISOString() }).eq('id', orderId);

        // Free the table
        const { data: order } = await supabase.from('orders').select('table_id').eq('id', orderId).single();
        if (order?.table_id) {
            await supabase.from('restaurant_tables').update({ status: 'available' }).eq('id', order.table_id);
        }

        showToast('ສຳເລັດ', 'ຊຳລະເງິນສຳເລັດ');
        document.querySelector('.modal.show')?.remove();
        await printReceipt(orderId);
        loadAllOrders(currentOrdersPage);
        if (currentPage === 'dashboard') loadDashboard();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

// ===== CANCEL SINGLE ORDER ITEM =====
async function cancelOrderItem(itemId, orderId, itemSubtotal) {
    console.log('Cancel item called:', { itemId, orderId, itemSubtotal });
    
    if (!confirm('ທ່ານຕ້ອງການຍົກເລີກລາຍການນີ້ແທ້ບໍ?')) return;
    
    const supabase = initSupabase();
    showLoading();
    
    try {
        // Get current order status
        const { data: order, error: orderError } = await supabase
            .from('orders')
            .select('status, table_id')
            .eq('id', orderId)
            .single();
        
        if (orderError) throw orderError;
        
        // Only allow cancellation for pending orders (before confirmation)
        if (order.status !== 'pending') {
            showToast('ແຈ້ງເຕືອນ', 'ສາມາດຍົກເລີກໄດ້ສະເພາະຄຳສັ່ງທີ່ຍັງບໍ່ທັນຢືນຢັນ', 'warning');
            hideLoading();
            return;
        }
        
        // 1. Delete the item from order_items (or mark as cancelled)
        const { error: deleteError } = await supabase
            .from('order_items')
            .update({ status: 'cancelled' })
            .eq('id', itemId);
        
        if (deleteError) throw deleteError;
        
        // 2. Get remaining active items
        const { data: remainingItems, error: itemsError } = await supabase
            .from('order_items')
            .select('id, subtotal, status')
            .eq('order_id', orderId)
            .neq('status', 'cancelled');  // Only get non-cancelled items
        
        if (itemsError) throw itemsError;
        
        console.log('Remaining items after cancellation:', remainingItems);
        
        // 3. Calculate new total
        const newTotal = remainingItems.reduce((sum, item) => sum + (item.subtotal || 0), 0);
        
        // 4. If no items left, cancel the whole order
        if (remainingItems.length === 0) {
            const { error: cancelOrderError } = await supabase
                .from('orders')
                .update({ 
                    status: 'cancelled', 
                    total_amount: 0,
                    cancelled_at: new Date().toISOString(),
                    cancelled_reason: 'ຍົກເລີກທຸກລາຍການ'
                })
                .eq('id', orderId);
            
            if (cancelOrderError) throw cancelOrderError;
            
            // Free the table if it was occupied
            if (order.table_id) {
                await supabase
                    .from('restaurant_tables')
                    .update({ status: 'available' })
                    .eq('id', order.table_id);
            }
            
            showToast('ສຳເລັດ', 'ຍົກເລີກຄຳສັ່ງທັງໝົດ', 'warning');
            document.querySelector('.modal.show')?.remove();
            
        } else {
            // 5. Update order total
            const { error: updateTotalError } = await supabase
                .from('orders')
                .update({ total_amount: newTotal })
                .eq('id', orderId);
            
            if (updateTotalError) throw updateTotalError;
            
            showToast('ສຳເລັດ', `ຍົກເລີກລາຍການສຳເລັດ (ຍອດລວມໃໝ່: ${formatCurrency(newTotal)})`, 'success');
            
            // Close and reopen modal to show updated data
            document.querySelector('.modal.show')?.remove();
            await viewOrderDetail(orderId);
        }
        
        // Refresh all pages
        if (currentPage === 'orders') await loadAllOrders(currentOrdersPage);
        if (currentPage === 'kds') await loadKDS();
        if (currentPage === 'dashboard') await loadDashboard();
        
    } catch (err) { 
        console.error('Cancel error:', err);
        showToast('ຜິດພາດ', err.message, 'error'); 
    }
    hideLoading();
}
// ===== CANCEL WHOLE ORDER =====
async function cancelWholeOrder(orderId, tableId) {
    if (!confirm('ທ່ານຕ້ອງການຍົກເລີກຄຳສັ່ງທັງໝົດແທ້ບໍ?')) return;
    const supabase = initSupabase();
    showLoading();
    try {
        await supabase.from('order_items').update({ status: 'cancelled' }).eq('order_id', orderId);
        await supabase.from('orders').update({
            status: 'cancelled',
            total_amount: 0,
            cancelled_at: new Date().toISOString()
        }).eq('id', orderId);
        // Free table
        if (tableId) await supabase.from('restaurant_tables').update({ status: 'available' }).eq('id', tableId);
        showToast('ສຳເລັດ', 'ຍົກເລີກຄຳສັ່ງ ແລະ ຄືນໂຕະສຳເລັດ', 'warning');
        document.querySelector('.modal.show')?.remove();
        loadAllOrders(currentOrdersPage);
        if (currentPage === 'tables') loadTablesManagement();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

// ===== CHANGE TABLE ====
async function changeOrderTable(orderId, oldTableId, modalId) {
    const selectId = `change-table-select-${modalId || orderId}`;
    const newTableId = document.getElementById(selectId)?.value;
    
    if (!newTableId) { 
        showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາເລືອກໂຕະໃໝ່', 'warning'); 
        return; 
    }
    
    if (!confirm('ທ່ານຕ້ອງການຍ້າຍໂຕະແທ້ບໍ?')) return;
    
    const supabase = initSupabase();
    showLoading();
    try {
        // Update order to new table
        const { error: orderError } = await supabase
            .from('orders')
            .update({ table_id: newTableId })
            .eq('id', orderId);
        
        if (orderError) throw orderError;
        
        // Free old table
        if (oldTableId) {
            const { error: oldTableError } = await supabase
                .from('restaurant_tables')
                .update({ status: 'available' })
                .eq('id', oldTableId);
            
            if (oldTableError) throw oldTableError;
        }
        
        // Occupy new table
        const { error: newTableError } = await supabase
            .from('restaurant_tables')
            .update({ status: 'occupied' })
            .eq('id', newTableId);
        
        if (newTableError) throw newTableError;
        
        showToast('ສຳເລັດ', 'ຍ້າຍໂຕະສຳເລັດ');
        document.querySelector('.modal.show')?.remove();
        
        // Refresh affected pages
        if (currentPage === 'orders') loadAllOrders(currentOrdersPage);
        if (currentPage === 'tables') loadTablesManagement();
        if (currentPage === 'dashboard') loadDashboard();
        
    } catch (err) { 
        showToast('ຜິດພາດ', err.message, 'error'); 
        console.error('Change table error:', err);
    }
    hideLoading();
}

        await supabase.from('orders').update({ status: 'cooking' }).eq('id', orderId);
        await supabase.from('order_items').update({ status: 'cooking' }).eq('order_id', orderId);

}

async function completeOrder(orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        await supabase.from('order_items').update({ status: 'completed' }).eq('order_id', orderId);

        loadKDS(); loadAllOrders(currentOrdersPage);
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }

}

                <div class="kds-grid" style="padding:16px;">

                        ? `<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-check-circle"></i><h3>ບໍ່ມີຄຳສັ່ງທີ່ລໍຖ້າ</h3><p>ຄຳສັ່ງໃໝ່ຈະສະແດງຂຶ້ນທີ່ນີ້</p></div>`
                        : orders.map(order => {
                            const mins = order.confirmed_at
                                ? Math.floor((Date.now() - new Date(order.confirmed_at)) / 60000) : 0;
                            const borderColor = mins > 20 ? 'var(--danger)' : mins > 10 ? 'var(--warning)' : 'var(--success)';
                            
                            // Filter out cancelled items
                            const activeItems = (order.order_items || []).filter(i => i.status !== 'cancelled');
                            const totalAmount = activeItems.reduce((sum, i) => sum + (i.subtotal || 0), 0);
                            const pendingItems = activeItems.filter(i => i.status !== 'completed');
                            
                            return `
                                <div class="kds-order-card" style="border-left-color:${borderColor};">
                                    <div class="kds-order-header">
                                        <div>
                                            <strong>${order.order_number}</strong>
                                            <div style="font-size:0.8rem;color:var(--gray-500);">ໂຕະ ${order.restaurant_tables?.table_number || '-'}</div>
                                            <div style="font-size:0.8rem;font-weight:600;color:var(--primary);">ລວມ: ${formatCurrency(totalAmount)}</div>
                                        </div>
                                        <div>
                                            <div class="timer" style="color:${borderColor};"><i class="fas fa-clock"></i> ${mins} ນາທີ</div>
                                            <span class="status-badge status-${order.status}" style="font-size:0.65rem;">${getStatusLabel(order.status)}</span>
                                        </div>
                                    </div>
                                    <div class="kds-items">
                                        ${pendingItems.length === 0
                                            ? `<p style="text-align:center;color:var(--success);padding:8px;"><i class="fas fa-check-circle"></i> ທຸກລາຍການສຳເລັດ</p>`
                                            : pendingItems.map(item => `
                                                <div class="kds-item">
                                                    <div>
                                                        <strong>${item.menu_item_name}</strong>
                                                        <span style="color:var(--gray-500);"> × ${item.quantity}</span>
                                                        ${item.special_instructions ? `<br><small style="color:var(--warning);"><i class="fas fa-comment"></i> ${item.special_instructions}</small>` : ''}
                                                    </div>
                                                    <button class="btn btn-success btn-sm" onclick="markItemComplete('${item.id}','${order.id}')">
                                                        <i class="fas fa-check"></i> ສຳເລັດ
                                                    </button>
                                                </div>`).join('')}
                                    </div>
                                    <button class="btn btn-primary btn-sm" style="width:100%;margin-top:12px;" onclick="markOrderComplete('${order.id}')">
                                        <i class="fas fa-check-double"></i> ສຳເລັດທຸກລາຍການ
                                    </button>
                                </div>`;
                        }).join('')}
                </div>
            </div>`;
    } catch (err) {
        content.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${err.message}</p></div>`;
    }
    hideLoading();
}
async function markItemComplete(itemId, orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        await supabase.from('order_items').update({ status: 'completed' }).eq('id', itemId);

        // Auto-complete order if all items done
        const { data: items } = await supabase.from('order_items').select('status').eq('order_id', orderId);
        if (items?.every(i => i.status === 'completed')) {
            await supabase.from('orders').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', orderId);
        }
        showToast('ສຳເລັດ', 'ອັບເດດລາຍການສຳເລັດ');
        loadKDS();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

async function markOrderComplete(orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        await supabase.from('order_items').update({ status: 'completed' }).eq('order_id', orderId);
        await supabase.from('orders').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', orderId);
        showToast('ສຳເລັດ', 'ຄຳສັ່ງສຳເລັດທຸກລາຍການ');
        loadKDS();
        if (currentPage === 'orders') loadAllOrders(currentOrdersPage);
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

async function loadReports(page = 1) {
    const content = document.getElementById('content-area');
    showLoading();
    try {
        const supabase = initSupabase();

        const { count: total } = await supabase
            .from('orders').select('*', { count: 'exact', head: true }).eq('status', 'paid');
        totalReports = total || 0;

        const start = (page - 1) * reportsPerPage;
        const end   = start + reportsPerPage - 1;

        const { data: orders, error } = await supabase
            .from('orders')
            .select('*, restaurant_tables(table_number)')
            .eq('status', 'paid')
            .order('paid_at', { ascending: false })
            .range(start, end);

        if (error) throw error;

        const totalRevenue = (orders || []).reduce((s, o) => s + (o.total_amount || 0), 0);
        const today        = new Date().toISOString().split('T')[0];
        const todayRevenue = (orders || []).filter(o => o.paid_at?.startsWith(today)).reduce((s, o) => s + (o.total_amount || 0), 0);
        const totalPages   = Math.max(1, Math.ceil(totalReports / reportsPerPage));

        content.innerHTML = `
            <div class="data-table-container">
                <div class="table-header">
                    <h3 class="table-title"><i class="fas fa-chart-line"></i> ລາຍງານການເງິນ</h3>
                    <div class="table-actions">
                        <select id="reports-per-page" onchange="changeReportsPerPage()" style="padding:6px 12px;border:1px solid var(--gray-300);border-radius:8px;font-family:inherit;">
                            <option value="10"  ${reportsPerPage===10  ?'selected':''}>10 ລາຍການ</option>
                            <option value="20"  ${reportsPerPage===20  ?'selected':''}>20 ລາຍການ</option>
                            <option value="50"  ${reportsPerPage===50  ?'selected':''}>50 ລາຍການ</option>
                            <option value="100" ${reportsPerPage===100 ?'selected':''}>100 ລາຍການ</option>
                        </select>
                        <button class="btn btn-outline btn-sm" onclick="exportFinancialReport()">
                            <i class="fas fa-download"></i> ສົ່ງອອກ Excel
                        </button>
                    </div>
                </div>

                <div class="dashboard-stats" style="padding:20px;margin:0;border-bottom:1px solid var(--gray-200);">
                    <div class="stat-card" style="border-left-color:var(--success);">
                        <div class="stat-header"><span class="stat-label">ລາຍຮັບທັງໝົດ (ໜ້ານີ້)</span><div class="stat-icon" style="background:var(--success-light);color:var(--success);"><i class="fas fa-chart-line"></i></div></div>
                        <div class="stat-value" style="font-size:1.2rem;">${formatCurrency(totalRevenue)}</div>
                    </div>
                    <div class="stat-card" style="border-left-color:var(--primary);">
                        <div class="stat-header"><span class="stat-label">ລາຍຮັບມື້ນີ້</span><div class="stat-icon"><i class="fas fa-calendar-day"></i></div></div>
                        <div class="stat-value" style="font-size:1.2rem;">${formatCurrency(todayRevenue)}</div>
                    </div>
                    <div class="stat-card" style="border-left-color:var(--info);">
                        <div class="stat-header"><span class="stat-label">ຈຳນວນຄຳສັ່ງທັງໝົດ</span><div class="stat-icon" style="background:var(--info-light);color:var(--info);"><i class="fas fa-clipboard-check"></i></div></div>
                        <div class="stat-value">${totalReports}</div>
                    </div>
                </div>

                <div style="overflow-x:auto;">
                    <table class="data-table" style="width:100%;">
                        <thead>
                            <tr><th>ເລກຄຳສັ່ງ</th><th>ໂຕະ</th><th>ລູກຄ້າ</th><th>ວັນທີຊຳລະ</th><th>ຍອດລວມ</th><th>ຈັດການ</th></tr>
                        </thead>
                        <tbody>
                            ${!orders || orders.length === 0
                                ? `<tr><td colspan="6" style="text-align:center;padding:60px;color:var(--gray-400);"><i class="fas fa-chart-line" style="font-size:2rem;display:block;margin-bottom:8px;"></i>ຍັງບໍ່ມີລາຍງານ</td></tr>`
                                : orders.map(o => `
                                    <tr>
                                        <td><strong>${o.order_number || '-'}</strong></td>
                                        <td>ໂຕະ ${o.restaurant_tables?.table_number || '-'}</td>
                                        <td>${o.customer_name || '-'}</td>
                                        <td style="font-size:0.8rem;color:var(--gray-500);">${formatDateTime(o.paid_at || o.created_at)}</td>
                                        <td style="font-weight:700;color:var(--primary);">${formatCurrency(o.total_amount)}</td>
                                        <td><button class="btn btn-outline btn-sm" onclick="printReceipt('${o.id}')"><i class="fas fa-print"></i></button></td>
                                    </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
                <div class="pagination">
                    <button class="btn btn-outline btn-sm" onclick="changeReportsPage(${page-1})" ${page<=1?'disabled':''}>
                        <i class="fas fa-chevron-left"></i> ກ່ອນໜ້າ
                    </button>
                    <span style="padding:6px 12px;font-size:0.875rem;">ໜ້າ ${page} / ${totalPages} &nbsp;(ທັງໝົດ ${totalReports} ລາຍການ)</span>

                    </button>
                </div>
            </div>`;
    } catch (err) {
        content.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${err.message}</p></div>`;
    }
    hideLoading();
}

function changeReportsPage(newPage) {
    const totalPages = Math.ceil(totalReports / reportsPerPage);
    if (newPage < 1 || newPage > totalPages) return;
    currentReportsPage = newPage;
    loadReports(currentReportsPage);
}

function changeReportsPerPage() {
    const el = document.getElementById('reports-per-page');
    if (el) { reportsPerPage = parseInt(el.value); currentReportsPage = 1; loadReports(1); }
}

async function exportFinancialReport() {
    showLoading();
    try {
        const supabase = initSupabase();
        const { data: orders } = await supabase
            .from('orders').select('*, restaurant_tables(table_number)').eq('status', 'paid').order('paid_at', { ascending: false });

        if (!orders || orders.length === 0) {
            showToast('ແຈ້ງເຕືອນ', 'ບໍ່ມີຂໍ້ມູນສຳລັບສົ່ງອອກ', 'warning');
            hideLoading(); return;
        }

        const rows = orders.map(o => ({
            'ເລກຄຳສັ່ງ':    o.order_number || '-',
            'ໂຕະ':           `ໂຕະ ${o.restaurant_tables?.table_number || '-'}`,
            'ລູກຄ້າ':        o.customer_name || '-',
            'ວັນທີຊຳລະ':    formatDateTime(o.paid_at || o.created_at),
            'ຍອດລວມ (₭)':   o.total_amount || 0
        }));

        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Financial_Report');
        XLSX.writeFile(wb, `report_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast('ສຳເລັດ', 'ສົ່ງອອກ Excel ສຳເລັດ');
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

async function startCashierQRScanner() {
    const readerDiv      = document.getElementById('cashier-qr-reader');
    const resultDiv      = document.getElementById('cashier-scan-result');
    const instructionDiv = document.getElementById('scan-instruction');

    readerDiv.style.display      = 'block';
    instructionDiv.style.display = 'none';
    resultDiv.innerHTML = `
        <button class="btn btn-danger btn-sm" onclick="closeCashierScanner()" style="margin-bottom:12px;">
            <i class="fas fa-times"></i> ປິດກ້ອງ
        </button>`;

    cashierScanner = new Html5Qrcode('cashier-qr-reader');
    try {
        await cashierScanner.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 300, height: 300 } },
            async (decodedText) => {
                await closeCashierScanner();
                const supabase = initSupabase();
                const { data: order, error } = await supabase
                    .from('orders')
                    .select('*, restaurant_tables(table_number)')
                    .eq('order_number', decodedText)
                    .single();

                if (error || !order) {
                    resultDiv.innerHTML += `
                        <div style="background:var(--danger-light);color:var(--danger);padding:14px;border-radius:8px;">
                            <i class="fas fa-exclamation-circle"></i> ບໍ່ພົບຄຳສັ່ງ: <strong>${decodedText}</strong>
                        </div>
                        <div style="margin-top:12px;">
                            <button class="btn btn-primary" onclick="startCashierQRScanner()"><i class="fas fa-camera"></i> ສະແກນໃໝ່</button>
                        </div>`;
                    instructionDiv.style.display = 'none';
                    return;
                }

                resultDiv.innerHTML = `
                    <div style="background:var(--success-light);color:var(--success);padding:12px;border-radius:8px;margin-bottom:12px;">
                        <i class="fas fa-check-circle"></i> ພົບຄຳສັ່ງ!
                    </div>
                    <div class="data-table-container" style="text-align:left;">
                        <table class="data-table">
                            <tr><th>ເລກຄຳສັ່ງ</th><td><strong>${order.order_number}</strong></td></tr>
                            <tr><th>ໂຕະ</th><td>ໂຕະ ${order.restaurant_tables?.table_number || '-'}</td></tr>
                            <tr><th>ລູກຄ້າ</th><td>${order.customer_name || '-'}</td></tr>
                            <tr><th>ຍອດລວມ</th><td style="font-weight:700;color:var(--primary);">${formatCurrency(order.total_amount)}</td></tr>
                            <tr><th>ສະຖານະ</th><td><span class="status-badge status-${order.status}">${getStatusLabel(order.status)}</span></td></tr>
                        </table>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center;">
                        <button class="btn btn-primary" onclick="viewOrderDetail('${order.id}')"><i class="fas fa-eye"></i> ລາຍລະອຽດ</button>
                        ${order.status === 'completed' ? `<button class="btn btn-success" onclick="markAsPaid('${order.id}')"><i class="fas fa-money-bill"></i> ຊຳລະ</button>` : ''}
                        <button class="btn btn-outline" onclick="startCashierQRScanner()"><i class="fas fa-camera"></i> ສະແກນໃໝ່</button>
                    </div>`;
            },
            () => {} // scan error (silent)
        );
    } catch (err) {
        instructionDiv.style.display = 'block';
        readerDiv.style.display      = 'none';
        resultDiv.innerHTML = `<div style="background:var(--danger-light);color:var(--danger);padding:14px;border-radius:8px;">
            <i class="fas fa-exclamation-circle"></i> ບໍ່ສາມາດເປີດກ້ອງໄດ້: ${err.message}
        </div>`;
    }
}

async function closeCashierScanner() {
    if (cashierScanner) {
        try { if (cashierScanner.isScanning) await cashierScanner.stop(); } catch (_) {}
        cashierScanner = null;

    const el = document.getElementById('cashier-qr-reader');
    if (el) el.style.display = 'none';

function stopCashierScanner() {
    if (cashierScanner) {

}

function renderCategoryTabs(cats) {

        <div class="category-tab active" onclick="filterByCategory(null, this)">

                <i class="fas ${c.icon || 'fa-utensils'}"></i> ${c.name_lo}
            </div>`).join('')}`;

function filterByCategory(categoryId, el) {
    // Toggle active tab
    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
    if (el) el.classList.add('active');

    const filtered = categoryId
        ? menuItems.filter(item => item.category_id === categoryId)
        : menuItems;
    renderMenuItems(filtered);
}

function changeModalQty(delta) {
    const el  = document.getElementById('modal-qty');
    if (!el) return;
    const cur = parseInt(el.textContent) || 1;
    const nv  = Math.max(1, cur + delta);
    el.textContent = nv;
}

function addToCartFromModal(itemId) {
    const qty  = parseInt(document.getElementById('modal-qty')?.textContent) || 1;
    const note = document.getElementById('modal-note')?.value.trim();
    addToCart(itemId, qty, note);
    document.querySelector('.modal.show')?.remove();
}

// ============================================
// CART LOGIC
// ============================================
function addToCart(itemId, qty = 1, note = '') {
    const item = menuItems.find(m => m.id === itemId);
    if (!item) return;

    const existing = cart.find(c => c.id === itemId && c.note === note);
    if (existing) {
        existing.quantity += qty;
        existing.subtotal  = existing.quantity * existing.price;
    } else {
        cart.push({
            id:       item.id,
            name:     item.name_lo,
            price:    item.price,
            quantity: qty,
            subtotal: item.price * qty,
            note:     note || ''
        });
    }
    updateCartUI();
    showToast('ເພີ່ມໃສ່ກະຕ່າ', `${item.name_lo} × ${qty}`, 'success');
}

function updateCartQty(itemId, note, delta) {
    const idx = cart.findIndex(c => c.id === itemId && c.note === note);
    if (idx === -1) return;

    cart[idx].quantity += delta;
    if (cart[idx].quantity <= 0) {
        cart.splice(idx, 1);
    } else {
        cart[idx].subtotal = cart[idx].quantity * cart[idx].price;
    }
    updateCartUI();
    renderCartItems();
}

function removeFromCart(itemId, note) {
    cart = cart.filter(c => !(c.id === itemId && c.note === note));
    updateCartUI();
    renderCartItems();
}

function updateCartUI() {
    const total      = cart.reduce((s, i) => s + i.subtotal, 0);
    const totalItems = cart.reduce((s, i) => s + i.quantity, 0);

    const countEl  = document.getElementById('cart-count');
    const totalEl  = document.getElementById('cart-total-amount');
    if (countEl)  { countEl.textContent = totalItems; countEl.style.display = totalItems > 0 ? 'flex' : 'none'; }
    if (totalEl)  totalEl.textContent = formatCurrency(total);
}

function renderCartItems() {
    const cartItemsEl = document.getElementById('cart-items');
    if (!cartItemsEl) return;

    if (cart.length === 0) {
        cartItemsEl.innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--gray-400);">
                <i class="fas fa-shopping-cart fa-2x" style="display:block;margin-bottom:12px;"></i>
                ກະຕ່າຫວ່າງ
            </div>`;
        return;
    }

    cartItemsEl.innerHTML = cart.map(item => `
        <div class="cart-item">
            <div class="cart-item-info">
                <div class="cart-item-name">${item.name}</div>
                ${item.note ? `<div style="font-size:0.7rem;color:var(--warning);"><i class="fas fa-comment"></i> ${item.note}</div>` : ''}
                <div class="cart-item-price">${formatCurrency(item.price)} × ${item.quantity} = <strong style="color:var(--primary);">${formatCurrency(item.subtotal)}</strong></div>
            </div>
            <div class="cart-item-qty">
                <button class="qty-btn" onclick="updateCartQty('${item.id}','${item.note}',-1)">−</button>
                <span style="font-weight:600;">${item.quantity}</span>
                <button class="qty-btn" onclick="updateCartQty('${item.id}','${item.note}',1)">+</button>
                <button class="qty-btn" onclick="removeFromCart('${item.id}','${item.note}')" style="color:var(--danger);border-color:var(--danger);">
                    <i class="fas fa-trash-alt" style="font-size:0.75rem;"></i>
                </button>
            </div>
        </div>`).join('');
}

function openCart() {
    renderCartItems();
    document.getElementById('cart-sidebar')?.classList.add('open');
}

function closeCart() {
    document.getElementById('cart-sidebar')?.classList.remove('open');
}

// ============================================
// CHECKOUT MODAL
// ============================================
function checkout() {

    }
    closeCart();

    const total = cart.reduce((s, i) => s + i.subtotal, 0);
    const modal = document.createElement('div');
    modal.className = 'modal show';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:520px;">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> ຢືນຢັນການສັ່ງ</h3>
                <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> ຊື່ລູກຄ້າ</label>
                        <input type="text" id="customer_name" placeholder="ຊື່ຂອງທ່ານ">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> ເບີໂທ</label>
                        <input type="tel" id="customer_phone" placeholder="020 XXXXXXXX">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-comment"></i> ໝາຍເຫດ</label>
                    <textarea id="special_notes" rows="2" placeholder="ຄຳແນະນຳເພີ່ມເຕີມ..."></textarea>
                </div>
                <div style="border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;margin-top:8px;">
                    <div style="background:var(--gray-50);padding:10px 14px;font-weight:600;border-bottom:1px solid var(--gray-200);">
                        ສຳລັບລາຍການ
                    </div>
                    ${cart.map(item => `
                        <div style="display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--gray-100);">
                            <div>
                                <span>${item.name}</span>
                                <span style="color:var(--gray-500);"> × ${item.quantity}</span>
                                ${item.note ? `<br><small style="color:var(--warning);"><i class="fas fa-comment"></i> ${item.note}</small>` : ''}
                            </div>
                            <strong>${formatCurrency(item.subtotal)}</strong>
                        </div>`).join('')}
                    <div style="display:flex;justify-content:space-between;padding:12px 14px;background:var(--gray-50);font-weight:700;">
                        <span>ລວມທັງໝົດ</span>
                        <span style="color:var(--primary);font-size:1.1rem;">${formatCurrency(total)}</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">ຍົກເລີກ</button>
                <button class="btn btn-primary" id="submit-order-btn" onclick="submitOrder()">
                    <i class="fas fa-paper-plane"></i> ຢືນຢັນ ແລະ ສັ່ງ
                </button>
            </div>
        </div>`;
    document.body.appendChild(modal);
}

// ============================================
// SUBMIT ORDER
// ============================================
async function submitOrder() {
    const supabase      = initSupabase();
    const customerName  = document.getElementById('customer_name')?.value.trim() || 'ລູກຄ້າ';
    const customerPhone = document.getElementById('customer_phone')?.value.trim();
    const specialNotes  = document.getElementById('special_notes')?.value.trim();
    const totalAmount   = cart.reduce((s, i) => s + i.subtotal, 0);
    const orderNumber   = `ORD${Date.now()}`;

    // Disable button to prevent double-submit
    const btn = document.getElementById('submit-order-btn');
    if (btn) btn.disabled = true;

    showLoading();
    try {
        // 1. Create order
        const { data: order, error: orderErr } = await supabase
            .from('orders').insert([{
                order_number:         orderNumber,
                table_id:             currentTableId,
                customer_name:        customerName,
                customer_phone:       customerPhone,
                order_type:           'dine_in',
                status:               'pending',
                special_instructions: specialNotes,
                total_amount:         totalAmount
            }]).select().single();

        if (orderErr) throw orderErr;

        // 2. Create order items (include special_instructions per item from note)
        const orderItems = cart.map(item => ({
            order_id:             order.id,
            menu_item_id:         item.id,
            menu_item_name:       item.name,
            quantity:             item.quantity,
            unit_price:           item.price,
            subtotal:             item.subtotal,
            status:               'pending',
            special_instructions: item.note || null
        }));

        const { error: itemsErr } = await supabase.from('order_items').insert(orderItems);
        if (itemsErr) throw itemsErr;

        // 3. Update table status to occupied
        const { error: tableErr } = await supabase
            .from('restaurant_tables')
            .update({ status: 'occupied' })
            .eq('id', currentTableId);
        if (tableErr) console.warn('Table status update failed:', tableErr.message);

        // 4. Success — clear cart & show confirmation
        hideLoading();
        document.querySelector('.modal.show')?.remove();
        cart = [];
        updateCartUI();

        showOrderConfirmation(orderNumber, totalAmount, customerName);

    } catch (err) {
        hideLoading();
        if (btn) btn.disabled = false;
        showToast('ຜິດພາດ', err.message, 'error');
        console.error('submitOrder error:', err);
    }
}

            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button class="btn btn-primary" onclick="this.closest('.modal').remove()">
                    <i class="fas fa-utensils"></i> ສັ່ງເພີ່ມ
                </button>
            </div>
        </div>`;
    document.body.appendChild(modal);
}
