let currentRecipePage = 1;
let recipeItemsPerPage = 9;
let recipeSearchTerm = '';
let allMenuItemsForRecipe = [];

async function loadRecipeManagement() {
    const content = document.getElementById('content-area');
    showLoading();
    try {
        const supabase = initSupabase();

        // Fetch all menu items once
        const { data: menuItemsData, error: menuError } = await supabase
            .from('menu_items')
            .select('id, name_lo')
            .eq('is_available', true)
            .order('name_lo');

        if (menuError) throw menuError;
        if (!menuItemsData || menuItemsData.length === 0) {
            content.innerHTML = `<div class="empty-state"><i class="fas fa-utensils"></i><h3>ບໍ່ມີລາຍການອາຫານ</h3><p>ກະລຸນາສ້າງເມນູກ່ອນ</p></div>`;
            hideLoading();
            return;
        }

        allMenuItemsForRecipe = menuItemsData;
        await renderRecipeGrid();
    } catch (err) {
        content.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${err.message}</p></div>`;
    }
    hideLoading();
}

async function renderRecipeGrid() {
    const content = document.getElementById('content-area');
    
    // Filter by search term
    let filtered = allMenuItemsForRecipe;
    if (recipeSearchTerm) {
        filtered = filtered.filter(item => 
            item.name_lo.toLowerCase().includes(recipeSearchTerm.toLowerCase())
        );
    }
    
    // Pagination
    const totalItems = filtered.length;
    const totalPages = Math.ceil(totalItems / recipeItemsPerPage);
    const start = (currentRecipePage - 1) * recipeItemsPerPage;
    const paginatedItems = filtered.slice(start, start + recipeItemsPerPage);
    
    // Fetch ingredients for each menu item in this page
    const supabase = initSupabase();
    const itemsWithIngredients = await Promise.all(paginatedItems.map(async (menu) => {
        const { data: links } = await supabase
            .from('menu_item_ingredients')
            .select('*, ingredients(id, name, unit)')
            .eq('menu_item_id', menu.id);
        return { ...menu, links: links || [] };
    }));
    
    // Generate HTML
    const cardsHtml = itemsWithIngredients.map(menu => {
        const ingredientsList = menu.links.length > 0
            ? menu.links.map(link => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-200);">
                    <div style="font-size:0.8rem;">
                        <strong>${link.ingredients?.name || 'ບໍ່ຮູ້ຊື່'}</strong>
                        <span style="color:var(--gray-500);"> × ${link.quantity_used} ${link.ingredients?.unit || ''}</span>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="removeRecipeIngredient('${link.id}','${menu.id}')" title="ລຶບ">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('')
            : '<div style="color:var(--gray-400); text-align:center; padding:12px; font-size:0.8rem;">ຍັງບໍ່ມີວັດຖຸດິບ</div>';
        
        return `
            <div class="data-table-container" style="display:flex;flex-direction:column;height:100%;">
                <div class="table-header" style="flex-shrink:0;">
                    <h3 class="table-title" style="font-size:1rem;">${menu.name_lo}</h3>
                    <button class="btn btn-primary btn-sm" onclick="showAddRecipeModal('${menu.id}','${menu.name_lo}')">
                        <i class="fas fa-plus"></i> ເພີ່ມ
                    </button>
                </div>
                <div style="padding:12px; flex-grow:1;">
                    ${ingredientsList}
                </div>
            </div>
        `;
    }).join('');
    
    // Generate pagination controls
    let paginationHtml = '';
    if (totalPages > 1) {
        paginationHtml = `
            <div class="pagination" style="margin-top:20px;">
                <button class="btn btn-outline btn-sm" onclick="changeRecipePage(${currentRecipePage - 1})" ${currentRecipePage <= 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i> ກ່ອນໜ້າ
                </button>
                <span style="padding:6px 12px;">ໜ້າ ${currentRecipePage} / ${totalPages} (${totalItems} ລາຍການ)</span>
                <button class="btn btn-outline btn-sm" onclick="changeRecipePage(${currentRecipePage + 1})" ${currentRecipePage >= totalPages ? 'disabled' : ''}>
                    ຕໍ່ໄປ <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        `;
    }
    
    content.innerHTML = `
        <div class="data-table-container" style="margin-bottom:20px;">
            <div class="table-header">
                <h3 class="table-title"><i class="fas fa-blender"></i> ສູດອາຫານ (ຜູກວັດຖຸດິບກັບເມນູ)</h3>
                <div class="table-actions">
                    <input type="text" id="recipe-search" class="search-input" placeholder="ຄົ້ນຫາເມນູ..." 
                        value="${recipeSearchTerm}" style="width:200px;">
                </div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px;">
            ${cardsHtml}
        </div>
        ${paginationHtml}
    `;
    
    // Attach search event with debounce
    const searchInput = document.getElementById('recipe-search');
    if (searchInput) {
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                recipeSearchTerm = e.target.value;
                currentRecipePage = 1;
                renderRecipeGrid();
            }, 400);
        });
    }
}

function changeRecipePage(newPage) {
    const totalPages = Math.ceil(allMenuItemsForRecipe.filter(i => 
        i.name_lo.toLowerCase().includes(recipeSearchTerm.toLowerCase())
    ).length / recipeItemsPerPage);
    if (newPage >= 1 && newPage <= totalPages) {
        currentRecipePage = newPage;
        renderRecipeGrid();
    }
}

// Show modal to add an ingredient link to a menu item
async function showAddRecipeModal(menuItemId, menuItemName) {
    const supabase = initSupabase();
    // Fetch all active ingredients
    const { data: ingredients } = await supabase
        .from('ingredients')
        .select('id, name, unit')
        .eq('is_active', true)
        .order('name');

    if (!ingredients || ingredients.length === 0) {
        showToast('ແຈ້ງເຕືອນ', 'ຍັງບໍ່ມີວັດຖຸດິບໃນລະບົບ', 'warning');
        return;
    }

    const modal = document.createElement('div');
    modal.className = 'modal show';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:450px;">
            <div class="modal-header">
                <h3><i class="fas fa-link"></i> ເພີ່ມວັດຖຸດິບໃສ່ ${menuItemName}</h3>
                <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ເລືອກວັດຖຸດິບ <span class="required">*</span></label>
                    <select id="recipe-ingredient-id" style="width:100%;padding:8px;border:1px solid var(--gray-300);border-radius:8px;">
                        <option value="">-- ເລືອກ --</option>
                        ${ingredients.map(ing => `<option value="${ing.id}">${ing.name} (${ing.unit})</option>`).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label>ຈຳນວນທີ່ໃຊ້ຕໍ່ 1 ຈານ <span class="required">*</span></label>
                    <input type="number" id="recipe-quantity" step="any" min="0.01" value="1" placeholder="1">
                </div>
                <small style="color:var(--gray-500);">ຕົວຢ່າງ: ຊີ້ນໝູ 0.2 kg, ຜັກຫອມ 0.05 kg</small>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">ຍົກເລີກ</button>
                <button class="btn btn-primary" onclick="saveRecipeIngredient('${menuItemId}')">ບັນທຶກ</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

// Save the new recipe line
async function saveRecipeIngredient(menuItemId) {
    const ingredientId = document.getElementById('recipe-ingredient-id')?.value;
    const quantity = parseFloat(document.getElementById('recipe-quantity')?.value);

    if (!ingredientId) {
        showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາເລືອກວັດຖຸດິບ', 'warning');
        return;
    }
    if (!quantity || quantity <= 0) {
        showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຈຳນວນທີ່ຖືກຕ້ອງ', 'warning');
        return;
    }

    const supabase = initSupabase();
    showLoading();
    try {
        // Check if already linked
        const { data: existing } = await supabase
            .from('menu_item_ingredients')
            .select('id')
            .eq('menu_item_id', menuItemId)
            .eq('ingredient_id', ingredientId)
            .maybeSingle();

        if (existing) {
            showToast('ແຈ້ງເຕືອນ', 'ວັດຖຸດິບນີ້ຖືກເພີ່ມແລ້ວ (ກະລຸນາແກ້ໄຂຈຳນວນຜ່ານການລຶບ ແລະ ເພີ່ມໃໝ່)', 'warning');
            hideLoading();
            return;
        }

        await supabase.from('menu_item_ingredients').insert([{
            menu_item_id: menuItemId,
            ingredient_id: ingredientId,
            quantity_used: quantity
        }]);

        await writeAuditLog('ADD_RECIPE', 'menu_item_ingredients', `${menuItemId}-${ingredientId}`,
            null, { menu_item_id: menuItemId, ingredient_id: ingredientId, quantity_used: quantity });

        document.querySelector('.modal.show')?.remove();
        showToast('ສຳເລັດ', 'ເພີ່ມວັດຖຸດິບເຂົ້າສູດສຳເລັດ');
        loadRecipeManagement();
    } catch (err) {
        showToast('ຜິດພາດ', err.message, 'error');
    }
    hideLoading();
}

// Remove a recipe line
async function removeRecipeIngredient(linkId, menuItemId) {
    if (!confirm('ທ່ານຕ້ອງການລຶບວັດຖຸດິບນີ້ອອກຈາກສູດແທ້ບໍ?')) return;
    const supabase = initSupabase();
    showLoading();
    try {
        await supabase.from('menu_item_ingredients').delete().eq('id', linkId);
        await writeAuditLog('DELETE_RECIPE', 'menu_item_ingredients', linkId,
            { menu_item_id: menuItemId }, null);
        showToast('ສຳເລັດ', 'ລຶບວັດຖຸດິບອອກຈາກສູດແລ້ວ');
        loadRecipeManagement();
    } catch (err) {
        showToast('ຜິດພາດ', err.message, 'error');
    }
    hideLoading();
}

                    <div class="form-group"><label>ລາຄາ/ໜ່ວຍ (₭)</label><input type="number" id="ing_cost" min="0" value="0"></div>

async function saveIngredient() {
    const supabase = initSupabase();
    const name = document.getElementById('ing_name')?.value.trim();
    if (!name) { showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຊື່ວັດຖຸດິບ', 'warning'); return; }
    showLoading();
    try {
        await supabase.from('ingredients').insert([{
            name,
            unit:          document.getElementById('ing_unit')?.value,
            current_stock: parseFloat(document.getElementById('ing_stock')?.value) || 0,
            minimum_stock: parseFloat(document.getElementById('ing_min')?.value) || 1,
            cost_per_unit: parseFloat(document.getElementById('ing_cost')?.value) || 0,
            is_active: true
        }]);
        await writeAuditLog('ADD_INGREDIENT', 'ingredients', name, null, { name });
        document.querySelector('.modal.show')?.remove();
        showToast('ສຳເລັດ', 'ເພີ່ມວັດຖຸດິບສຳເລັດ');
        loadStockManagement();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

function showRestockModal(id, name, currentStock) {
    const modal = document.createElement('div');
    modal.className = 'modal show';
    modal.innerHTML = `
        <div class="modal-content" style="max-width:380px;">
            <div class="modal-header">
                <h3><i class="fas fa-plus-circle"></i> ເຕີມສະຕ໋ອກ: ${name}</h3>
                <button class="close-btn" onclick="this.closest('.modal').remove()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color:var(--gray-600);margin-bottom:16px;">ສະຕ໋ອກປັດຈຸບັນ: <strong>${currentStock}</strong></p>
                <div class="form-group">
                    <label>ຈຳນວນທີ່ເຕີມ <span class="required">*</span></label>
                    <input type="number" id="restock-qty" min="0.1" step="0.1" value="1" placeholder="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">ຍົກເລີກ</button>
                <button class="btn btn-success" onclick="restockIngredient('${id}','${name}',${currentStock})">
                    <i class="fas fa-plus-circle"></i> ເຕີມ
                </button>
            </div>
        </div>`;
    document.body.appendChild(modal);
}

async function restockIngredient(id, name, currentStock) {
    const supabase = initSupabase();
    const qty = parseFloat(document.getElementById('restock-qty')?.value) || 0;
    if (qty <= 0) { showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຈຳນວນທີ່ຖືກຕ້ອງ', 'warning'); return; }
    showLoading();
    try {
        const newStock = currentStock + qty;
        await supabase.from('ingredients').update({ current_stock: newStock }).eq('id', id);
        await writeAuditLog('RESTOCK', 'ingredients', id,
            { current_stock: currentStock },
            { current_stock: newStock, added: qty }
        );
        document.querySelector('.modal.show')?.remove();
        showToast('ສຳເລັດ', `ເຕີມ ${name} +${qty} ສຳເລັດ (ໃໝ່: ${newStock})`);
        loadStockManagement();
    } catch (err) { showToast('ຜິດພາດ', err.message, 'error'); }
    hideLoading();
}

// Deduct stock when order is paid
        async function deductStockForOrder(orderId) {
    try {
        const supabase = initSupabase();
        const { error } = await supabase.rpc('deduct_stock_for_order', { p_order_id: orderId });
        if (error) throw error;
    } catch (e) {
        console.warn('Stock deduction failed (non-critical):', e.message);
    }
}
