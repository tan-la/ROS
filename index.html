<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Restaurant Ordering System - ລະບົບສັ່ງອາຫານ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --primary-light: #fdebd0;
            --success: #27ae60;
            --success-light: #d5f5e3;
            --warning: #f39c12;
            --warning-light: #fef9e7;
            --danger: #e74c3c;
            --danger-light: #fadbd8;
            --info: #3498db;
            --info-light: #d6eaf8;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --white: #ffffff;
            --border-radius: 12px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Noto Sans Lao', sans-serif;
            background: var(--gray-100);
            color: var(--gray-800);
            font-size: 14px;
        }

        /* Login Styles */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
        }

        .login-box {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo {
            width: 80px;
            height: 80px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-header .logo i { font-size: 36px; color: var(--primary); }
        .login-header h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }

        .login-form .form-group { margin-bottom: 20px; }
        .login-form label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.875rem; }
        .login-form input, .login-form select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 0.9375rem;
        }
        .login-form input:focus, .login-form select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { background: var(--primary-dark); }

        /* App Container */
        .app-container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 12px;
            height: 60px;
        }
        .logo-small {
            width: 36px;
            height: 36px;
            background: var(--primary-light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-small i { color: var(--primary); font-size: 1.125rem; }
        .brand-name { font-weight: 700; font-size: 1.125rem; }
        
        .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
        .sidebar-nav ul { list-style: none; }
        .sidebar-nav li { margin-bottom: 4px; }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
        }
        .sidebar-nav a:hover { background: var(--gray-100); color: var(--primary); }
        .sidebar-nav a.active { background: var(--primary-light); color: var(--primary); }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--gray-200);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-name { font-weight: 600; font-size: 0.875rem; }
        .user-role { font-size: 0.75rem; color: var(--gray-500); }
        
        .btn-logout {
            width: 100%;
            padding: 10px;
            background: var(--danger-light);
            color: var(--danger);
            border: none;
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-logout:hover { background: var(--danger); color: var(--white); }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
            min-height: 100vh;
        }
        
        .top-bar {
            height: 60px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .page-title h2 { font-size: 1.25rem; font-weight: 600; }
        .top-actions { display: flex; align-items: center; gap: 16px; }
        .current-time { font-size: 0.875rem; color: var(--gray-500); }
        
        .content-area { padding: 24px; }

        /* Dashboard Stats */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .stat-label { font-size: 0.875rem; color: var(--gray-500); }
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary);
        }
        .stat-value { font-size: 1.75rem; font-weight: 700; }

        /* Table Styles */
        .data-table-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        .table-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .table-title { font-size: 1rem; font-weight: 600; }
        .table-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        .data-table th, .data-table td {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .data-table th {
            background: var(--gray-100);
            font-weight: 600;
        }
        .data-table tbody tr:hover { background: var(--gray-50); }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: var(--warning-light); color: var(--warning); }
        .status-confirmed { background: var(--info-light); color: var(--info); }
        .status-cooking { background: var(--primary-light); color: var(--primary); }
        .status-completed { background: var(--success-light); color: var(--success); }
        .status-paid { background: var(--success-light); color: var(--success); }
        .status-cancelled { background: var(--danger-light); color: var(--danger); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: var(--white); }
        .btn-danger { background: var(--danger); color: var(--white); }
        .btn-secondary { background: var(--gray-300); color: var(--gray-700); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-400); }
        .btn-sm { padding: 4px 12px; font-size: 0.75rem; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--white);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content.modal-lg { max-width: 900px; }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
        }
        .modal-header h3 { font-size: 1.125rem; font-weight: 600; }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-400);
        }
        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.875rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Menu Items Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .menu-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .menu-image {
            height: 160px;
            background: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .menu-info { padding: 12px; }
        .menu-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
        .menu-price { color: var(--primary); font-weight: 600; }
        .menu-description { font-size: 0.75rem; color: var(--gray-500); margin-top: 4px; }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 380px;
            height: 100vh;
            background: var(--white);
            box-shadow: -2px 0 8px rgba(0,0,0,0.1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        .cart-sidebar.open { transform: translateX(0); }
        .cart-header {
            padding: 16px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-200);
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 500; }
        .cart-item-price { font-size: 0.75rem; color: var(--gray-500); }
        .cart-item-qty { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--gray-300);
            background: white;
            cursor: pointer;
        }
        .cart-footer {
            padding: 16px;
            border-top: 1px solid var(--gray-200);
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.125rem;
            margin-bottom: 16px;
        }

        /* Table Grid */
        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .table-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .table-card:hover { transform: translateY(-2px); }
        .table-card.occupied { background: var(--danger-light); border-color: var(--danger); }
        .table-card.selected { background: var(--primary-light); border: 2px solid var(--primary); }
        .table-number { font-size: 1.5rem; font-weight: 700; }
        .table-status { font-size: 0.7rem; margin-top: 4px; }

        /* KDS Styles */
        .kds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .kds-order-card {
            background: var(--white);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--warning);
        }
        .kds-order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--gray-200);
        }
        .kds-items { margin: 12px 0; }
        .kds-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dotted var(--gray-200);
        }
        .timer { font-size: 0.75rem; color: var(--gray-500); }

        /* Customer Web App */
        .customer-header {
            background: var(--primary);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
        }
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .category-tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 12px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            position: sticky;
            top: 60px;
        }
        .category-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--gray-100);
            cursor: pointer;
            white-space: nowrap;
        }
        .category-tab.active {
            background: var(--primary);
            color: white;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            background: var(--white);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--primary);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--gray-300);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .cart-sidebar { width: 100%; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo"><i class="fas fa-utensils"></i></div>
                <h1>ລະບົບສັ່ງອາຫານຮ້ານອາຫານ</h1>
                <p class="subtitle">Restaurant Ordering System</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> ອີເມວ</label>
                    <input type="email" id="email" placeholder="cashier@test.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> ລະຫັດຜ່ານ</label>
                    <input type="password" id="password" placeholder="123456" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> ຕຳແໜ່ງ</label>
                    <select id="role" required>
                        <option value="">ເລືອກຕຳແໜ່ງ</option>
                        <option value="cashier">ພະນັກງານເງິນ (Cashier)</option>
                        <option value="kitchen">ພໍ່ຄົວ (Kitchen)</option>
                        <option value="waiter">ພະນັກງານບໍລິການ (Waiter)</option>
                        <option value="admin">ຜູ້ບໍລິຫານ (Admin)</option>
                    </select>
                </div>
                <button id="login-btn" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> ເຂົ້າສູ່ລະບົບ
                </button>
                <div id="login-error" class="error-message" style="display:none; color:var(--danger); margin-top:12px;"></div>
            </div>
            <div class="login-footer" style="text-align:center; margin-top:24px; font-size:0.75rem; color:var(--gray-400);">
                <p>Demo: cashier@test.com / 123456 / cashier</p>
            </div>
        </div>
    </div>

    <!-- Main App (Staff) -->
    <div id="main-app" class="app-container" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-small"><i class="fas fa-utensils"></i></div>
                <span class="brand-name">ເມນູອາຫານ</span>
            </div>
            <nav class="sidebar-nav">
                <ul id="nav-menu"></ul>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                    <div class="user-details">
                        <span id="user-name" class="user-name">User</span>
                        <span id="user-role" class="user-role">Role</span>
                    </div>
                </div>
                <button id="logout-btn" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> ອອກຈາກລະບົບ
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h2 id="page-title">ໜ້າຫຼັກ</h2>
                </div>
                <div class="top-actions">

            const supabase = initSupabase();

        async function saveMenuItem() {
            const supabase = initSupabase();
            const code = document.getElementById('item_code')?.value;
            const name_lo = document.getElementById('item_name_lo')?.value;
            const category_id = document.getElementById('item_category')?.value;
            const price = parseFloat(document.getElementById('item_price')?.value) || 0;
            const description_lo = document.getElementById('item_description')?.value;
            const is_recommended = document.getElementById('item_recommended')?.checked;
            
            if (!name_lo) {
                showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຊື່ອາຫານ', 'error');
                return;
            }
            
            showLoading();
            try {
                await supabase.from('menu_items').insert([{
                    code: code || `ITEM${Date.now()}`,

                    category_id,
                    price,
                    description_lo,

                hideLoading();

                hideLoading();
                showToast('ຜິດພາດ', error.message, 'error');
            }

                loadMenuManagement();

                showToast('ຜິດພາດ', error.message, 'error');

        async function confirmOrder(orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        // ອັບເດດ orders
        await supabase.from('orders').update({ 
            status: 'confirmed', 
            confirmed_at: new Date().toISOString() 
        }).eq('id', orderId);
        
        // ອັບເດດ order_items (ສຳຄັນ!)
        const { error: itemsError } = await supabase
            .from('order_items')
            .update({ status: 'confirmed' })
            .eq('order_id', orderId);
        
        if (itemsError) {
            console.error('Error updating order items:', itemsError);
            throw itemsError;
        }
        
        hideLoading();
        showToast('ສຳເລັດ', 'ຢືນຢັນຄຳສັ່ງສຳເລັດ, ສົ່ງໄປເຮືອນຄົວແລ້ວ');
        
        // ຣີໂຫຼດທັງສອງໜ້າ
        await loadAllOrders();
        await loadKDS();
        
    } catch (error) {
        hideLoading();
        showToast('ຜິດພາດ', error.message, 'error');
    }
}
        async function markAsPaid(orderId) {
    const supabase = initSupabase();
    showLoading();
    try {
        // ອັບເດດສະຖານະເປັນຊຳລະແລ້ວ
        await supabase.from('orders').update({ 
            status: 'paid', 
            paid_at: new Date().toISOString() 
        }).eq('id', orderId);
        
        // ປ່ອຍໂຕະ
        const { data: order } = await supabase.from('orders').select('table_id').eq('id', orderId).single();

        hideLoading();
        showToast('ສຳເລັດ', 'ບັນທຶກການຊຳລະສຳເລັດ');
        
        // ພິມໃບຮັບເງິນ

        // ຣີໂຫຼດໜ້າ
        loadAllOrders();
        loadDashboard();
        
    } catch (error) {
        hideLoading();
        showToast('ຜິດພາດ', error.message, 'error');
    }
}

        async function markItemComplete(itemId, orderId) {
            const supabase = initSupabase();
            showLoading();
            try {
                await supabase.from('order_items').update({ status: 'completed' }).eq('id', itemId);
                
                // Check if all items are completed
                const { data: items } = await supabase.from('order_items').select('status').eq('order_id', orderId);
                const allCompleted = items?.every(i => i.status === 'completed');
                
                if (allCompleted) {
                    await supabase.from('orders').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', orderId);
                }
                
                hideLoading();
                showToast('ສຳເລັດ', 'ອັບເດດສະຖານະສຳເລັດ');
                loadKDS();
                loadAllOrders();
            } catch (error) {
                hideLoading();
                showToast('ຜິດພາດ', error.message, 'error');
            }
        }

        async function loadCustomerMenu() {
            const supabase = initSupabase();
            showLoading();
            try {
                const { data: cats } = await supabase.from('categories').select('*').eq('is_active', true).order('display_order');
                const { data: items } = await supabase.from('menu_items').select('*').eq('is_available', true);
                menuItems = items || [];
                categories = cats || [];
                
                // Render category tabs
                const tabsContainer = document.getElementById('category-tabs');
                tabsContainer.innerHTML = '<div class="category-tab active" data-category="all">ທັງໝົດ</div>';
                categories.forEach(cat => {
                    tabsContainer.innerHTML += `<div class="category-tab" data-category="${cat.id}">${cat.name_lo}</div>`;
                });
                
                // Add click handlers
                document.querySelectorAll('.category-tab').forEach(tab => {
                    tab.onclick = () => {
                        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        filterCustomerMenu(tab.dataset.category);
                    };
                });
                
                filterCustomerMenu('all');
            } catch (error) {
                showToast('ຜິດພາດ', error.message, 'error');
            }
            hideLoading();
        }

        function filterCustomerMenu(categoryId) {
            let filtered = menuItems;
            if (categoryId !== 'all') {
                filtered = menuItems.filter(item => item.category_id === categoryId);
            }
            
            const container = document.getElementById('customer-content');
            container.innerHTML = `
                <div class="menu-grid">
                    ${filtered.map(item => `
                        <div class="menu-card" onclick="addToCart('${item.id}', '${item.name_lo.replace(/'/g, "\\'")}', ${item.price})">
                            <div class="menu-image"><i class="fas fa-utensils fa-3x" style="color:var(--gray-400);"></i></div>
                            <div class="menu-info">
                                <div class="menu-name">${item.name_lo}</div>
                                <div class="menu-price">${formatCurrency(item.price)}</div>
                                ${item.is_recommended ? '<span style="font-size:10px; background:var(--warning-light); padding:2px 6px; border-radius:10px;">ແນະນຳ</span>' : ''}
                                ${item.description_lo ? `<div class="menu-description">${item.description_lo}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity++;
                existing.subtotal = existing.quantity * existing.price;
            } else {
                cart.push({ id, name, price, quantity: 1, subtotal: price });
            }
            updateCartUI();
            showToast('ເພີ່ມສຳເລັດ', `ເພີ່ມ ${name} ເຂົ້າກະຕ່າ`);
        }

        function updateCartUI() {
            const itemCount = cart.reduce((sum, i) => sum + i.quantity, 0);
            const total = cart.reduce((sum, i) => sum + i.subtotal, 0);
            
            document.getElementById('cart-count').textContent = itemCount;
            document.getElementById('cart-count').style.display = itemCount > 0 ? 'flex' : 'none';
            document.getElementById('cart-total-amount').textContent = formatCurrency(total);
            
            const cartItemsContainer = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<div style="text-align:center; padding:40px;"><i class="fas fa-shopping-cart fa-2x" style="color:var(--gray-400);"></i><p>ຍັງບໍ່ມີລາຍການ</p></div>';
                return;
            }
            
            cartItemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${formatCurrency(item.price)}</div>
                    </div>
                    <div class="cart-item-qty">
                        <button class="qty-btn" onclick="updateCartQty('${item.id}', -1)">-</button>
                        <span style="min-width:30px; text-align:center;">${item.quantity}</span>
                        <button class="qty-btn" onclick="updateCartQty('${item.id}', 1)">+</button>
                        <button class="qty-btn" style="background:var(--danger-light);" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash" style="font-size:10px;"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function updateCartQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                } else {
                    item.subtotal = item.quantity * item.price;
                }
                updateCartUI();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function closeCart() {

        async function submitOrder() {
    const supabase = initSupabase();
    const customerName = document.getElementById('customer_name')?.value || 'ລູກຄ້າ';
    const customerPhone = document.getElementById('customer_phone')?.value;
    const specialNotes = document.getElementById('special_notes')?.value;
    const totalAmount = cart.reduce((sum, i) => sum + i.subtotal, 0);
    const orderNumber = `ORD${Date.now()}`;
    
    console.log('Submitting order for table:', currentTableId);
    
    showLoading();
    try {
        // Create order
        const { data: order, error: orderError } = await supabase.from('orders').insert([{
            order_number: orderNumber,
            table_id: currentTableId,
            customer_name: customerName,
            customer_phone: customerPhone,
            order_type: 'dine_in',
            status: 'pending',
            special_instructions: specialNotes,
            total_amount: totalAmount
        }]).select().single();
        
        if (orderError) throw orderError;
        
        // Create order items
        const orderItems = cart.map(item => ({
            order_id: order.id,
            menu_item_id: item.id,
            menu_item_name: item.name,
            quantity: item.quantity,
            unit_price: item.price,
            subtotal: item.subtotal,
            status: 'pending'
        }));
        
        const { error: itemsError } = await supabase.from('order_items').insert(orderItems);
        if (itemsError) throw itemsError;
        
        // Mark table as occupied (ສຳຄັນ!)
        const { error: tableError, data: tableData } = await supabase
            .from('restaurant_tables')
            .update({ status: 'occupied' })
            .eq('id', currentTableId)
            .select();
        
        if (tableError) {
            console.error('Table update error:', tableError);
        } else {
            console.log('Table updated:', tableData);
        }
        
        hideLoading();
        document.querySelector('.modal.show')?.remove();
        closeCart();
        cart = [];
        updateCartUI();
        
        showToast('ສຳເລັດ', `ສັ່ງອາຫານສຳເລັດ! ເລກຄຳສັ່ງ: ${orderNumber}`, 'success');
        
        setTimeout(() => {
            alert(`ຄຳສັ່ງຂອງທ່ານຖືກສົ່ງໄປເຮືອນຄົວແລ້ວ\nເລກຄຳສັ່ງ: ${orderNumber}\nກະລຸນາລໍຖ້າພະນັກງານນຳສົ່ງອາຫານ`);
        }, 500);
        
    } catch (error) {
        hideLoading();
        showToast('ຜິດພາດ', error.message, 'error');
        console.error('Submit order error:', error);
    }
}

                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="this.closest(\'.modal\').remove()">ຍົກເລີກ</button>
                        <button class="btn btn-primary" onclick="saveCategory()">ບັນທຶກ</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        async function saveCategory() {
            const supabase = initSupabase();
            const name_lo = document.getElementById('cat_name_lo')?.value;
            if (!name_lo) {
                showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຊື່ໝວດໝູ່', 'error');
                return;
            }
            showLoading();
            try {
                await supabase.from('categories').insert([{
                    name_lo,
                    name_en: document.getElementById('cat_name_en')?.value,
                    icon: document.getElementById('cat_icon')?.value
                }]);
                hideLoading();
                document.querySelector('.modal.show')?.remove();
                showToast('ສຳເລັດ', 'ເພີ່ມໝວດໝູ່ສຳເລັດ');
                loadMenuManagement();
            } catch (error) {
                hideLoading();
                showToast('ຜິດພາດ', error.message, 'error');
            }
        }
        
        async function showAddStaffModal() {
            const modal = document.createElement('div');
            modal.className = 'modal show';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header"><h3><i class="fas fa-user-plus"></i> ເພີ່ມພະນັກງານໃໝ່</h3><button class="close-btn" onclick="this.closest(\'.modal\').remove()">&times;</button></div>
                    <div class="modal-body">
                        <div class="form-group"><label>ຊື່</label><input type="text" id="staff_name"></div>
                        <div class="form-group"><label>ອີເມວ</label><input type="email" id="staff_email"></div>
                        <div class="form-group"><label>ເບີໂທ</label><input type="tel" id="staff_phone"></div>
                        <div class="form-group"><label>ຕຳແໜ່ງ</label><select id="staff_role"><option value="cashier">ເງິນ</option><option value="kitchen">ຄົວ</option><option value="waiter">ບໍລິການ</option><option value="admin">ຜູ້ບໍລິຫານ</option></select></div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="this.closest(\'.modal\').remove()">ຍົກເລີກ</button>
                        <button class="btn btn-primary" onclick="saveStaff()">ບັນທຶກ</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        async function saveStaff() {
            const supabase = initSupabase();
            const name = document.getElementById('staff_name')?.value;
            const email = document.getElementById('staff_email')?.value;
            if (!name || !email) {
                showToast('ແຈ້ງເຕືອນ', 'ກະລຸນາປ້ອນຊື່ ແລະ ອີເມວ', 'error');
                return;
            }
            showLoading();
            try {
                await supabase.from('staff').insert([{
                    name,
                    email,
                    phone: document.getElementById('staff_phone')?.value,
                    role: document.getElementById('staff_role')?.value,
                    active: true
                }]);
                hideLoading();
                document.querySelector('.modal.show')?.remove();
                showToast('ສຳເລັດ', 'ເພີ່ມພະນັກງານສຳເລັດ (ລະຫັດຜ່ານເລີ່ມຕົ້ນ: 123456)');
                loadStaffManagement();
            } catch (error) {
                hideLoading();
                showToast('ຜິດພາດ', error.message, 'error');
            }
        }
    </script>
</body>
